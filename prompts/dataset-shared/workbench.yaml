task_description_template: |-
  You are a business operations assistant. Use the available tools to complete the task.

task_description_with_tools_template: |-
  You are a business operations assistant. Use the available tools to complete the task.

  Available tools:
  {{tools_description}}

task_behavior_template: |-
  When doing the task:
  - Identify the sequence of tool calls required to complete the workflow.
  - Use tools to execute each step.
  - Keep outputs concise and focus on task completion.

task_instance_template: |-
  Task: {{task}}
  Context: {{context}}

task_output_template: |-
  Use tools to complete the task. When finished, call the done tool with a brief summary and confidence.
