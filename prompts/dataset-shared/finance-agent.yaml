task_description_template: |-
  You are a financial analyst assistant. Answer the question using careful, multi-step reasoning.
  Use tools to gather evidence when helpful.

  Available tools:
  {{tools_description}}

task_description_with_tools_template: |-
  You are a financial analyst assistant. Today's date is {{current_date}}.
  Answer the question using careful, multi-step reasoning and the available tools.
  When you are confident, call the done tool with your final answer and confidence score.

  Available tools:
  {{tools_description}}

task_behavior_template: |-
  When doing the task:
  - Identify the financial concepts required (e.g., revenue, margin, cash flow, valuation).
  - Show concise calculations and state key assumptions.
  - If the question requires external facts, use tools to retrieve them and cite sources.
  - Provide a final answer that directly addresses the question.

task_instance_template: |-
  Question: {{question}}

task_output_template: |-
  Provide a concise final answer with any necessary calculations or rationale.
