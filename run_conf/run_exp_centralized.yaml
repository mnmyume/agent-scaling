defaults:
  - _self_
  - agent: multi-agent-centralized
  - dataset: plancraft-test

llm:
  model: gemini/gemini-2.5-flash
  params:
    temperature: 0.0

llm_tag: ${make_llm_tag:${agent},${llm}}

# Centralized architecture settings
agent:
  n_base_agents: 3
  min_iterations_per_agent: 3
  max_iterations_per_agent: 10
  orchestrator_llm:
    model: gemini/gemini-2.5-flash
    params:
      temperature: 0.0
  subagent_llms:
    - model: gemini/gemini-2.5-flash
      params:
        temperature: 0.0
    - model: gemini/gemini-2.5-flash
      params:
        temperature: 0.0
    - model: gemini/gemini-2.5-flash
      params:
        temperature: 0.0

log_langfuse: false
use_disk_cache: true
num_workers: 1
max_instances: 100

run_name: centralized_plancraft_${llm_tag}_${now:%Y-%m-%d}_${now:%H-%M-%S}

hydra:
  verbose: false
  run:
    dir: exp_outputs/${dataset.dataset_id}/${agent.name}/${llm_tag}/${now:%Y-%m-%d}/${now:%H-%M-%S}
hydra/job_logging: disabled
