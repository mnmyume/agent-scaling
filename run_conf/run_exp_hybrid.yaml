defaults:
  - _self_
  - agent: multi-agent-hybrid
  - dataset: plancraft-test

llm:
  model: gemini/gemini-2.5-flash
  params:
    temperature: 0.0

# Hybrid architecture settings
agent:
  n_base_agents: 3
  min_iterations_per_agent: 3
  max_iterations_per_agent: 10
  max_rounds: 2
  enable_peer_communication: true
  orchestrator_llm:
    model: gemini/gemini-2.5-flash
    params:
      temperature: 0.0
  subagent_llms:
    - model: gemini/gemini-2.5-flash
      params:
        temperature: 0.0
    - model: gemini/gemini-2.5-flash
      params:
        temperature: 0.0
    - model: gemini/gemini-2.5-flash
      params:
        temperature: 0.0

log_langfuse: false
use_disk_cache: true
num_workers: 1
max_instances: 100

run_name: hybrid_plancraft_${llm.model}_${now:%Y-%m-%d}_${now:%H-%M-%S}

hydra:
  verbose: false
  run:
    dir: exp_outputs/${dataset.dataset_id}/${agent.name}/${llm.model}/${now:%Y-%m-%d}/${now:%H-%M-%S}
hydra/job_logging: disabled
