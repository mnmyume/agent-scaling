defaults:
  - _self_
  - agent: single-agent
  - dataset: finance-agent

llm:
  model: openrouter/qwen/qwen3-235b-a22b-2507
  params:
    temperature: 0.0

llm_tag: ${make_llm_tag:${agent},${llm}}

log_langfuse: false
use_disk_cache: true
num_workers: 1
max_instances: 50

run_name: sas_finance_${llm_tag}_${now:%Y-%m-%d}_${now:%H-%M-%S}

hydra:
  verbose: false
  run:
    dir: exp_outputs/${dataset.dataset_id}/${agent.name}/${llm_tag}/${now:%Y-%m-%d}/${now:%H-%M-%S}
hydra/job_logging: disabled
